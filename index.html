<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<style>
    
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Intro */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}
.rotate{
    font-size:60px;
    animation:spin 2s linear infinite;
}
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
#canvas {
        position: absolute;
        left: 0;
        top: 0;
        filter: drop-shadow(0 0 35px rgba(255,70,120,0.9));
        transition: left 2.5s ease-out;   /* ← yeh sabse important line */
    }
    #text {
        position: absolute;
        right: 5%;
        top: 20%;
        width: 40%;
        display: none;
        opacity: 0;
        transition: opacity 1.2s ease-in;
    }
    #text.visible {
        opacity: 1;
    }
/* Layout */
#wrap{
    position:relative;
    width:100%;
    height:100vh;
}

#canvas{
    position:absolute;
    left:0;
    filter:drop-shadow(0 0 35px rgba(255,70,120,0.9));
}

#text{
    position:absolute;
    right:5%;
    top:20%;
    width:40%;
    display:none;
}

.say{
    font-size:20px;
    line-height:36px;
    color:#ff9ecb;
}

</style>
</head>

<body>

<div id="intro">
<div class="rotate">🔄</div>
Rotate Your Screen
</div>

<audio id="myAudio" loop>
<source src="aud.mp3" type="audio/mp3">
</audio>

<div id="wrap">
<canvas id="canvas" width="1100" height="680"></canvas>

<div id="text">
<div id="code">
<div class="say">My beautiful GIRL 💞</div>
<div class="say">HAPPY BIRTHDAY 🎈</div>
<div class="say">GOD bless you 🍀</div>
<div class="say">And give u many happiness 💕</div>
<div class="say">I loved you ❤️</div>
<div class="say">And I will always love u 🥺 ❤️</div>
<div class="say">Hope u have a great day today ❤️😘</div>
</div>
</div>
</div>

<script>

setTimeout(function(){
document.getElementById("intro").style.display="none";
},3000);

(function(){

var canvas = $('#canvas');
if (!canvas.length || !canvas[0].getContext) return;

var width = canvas.width();
var height = canvas.height();
canvas.attr("width", width);
canvas.attr("height", height);

var opts = {
seed:{ x:width/2-20,color:"rgb(255,80,120)",scale:2 },
branch:[[535,680,570,250,500,200,30,100,[
[540,500,455,417,340,400,13,100,[
[450,435,434,430,394,395,2,40]
]],
[550,445,600,356,680,345,12,100,[
[578,400,648,409,661,426,3,80]
]],
[539,281,537,248,534,217,3,40],
[546,397,413,247,328,244,9,80,[
[427,286,383,253,371,205,2,40],
[498,345,435,315,395,330,4,60]
]],
[546,357,608,252,678,221,6,100,[
[590,293,646,277,648,271,2,80]
]]
]]],
bloom:{ num:700,width:1080,height:650 },
footer:{ width:1200,height:5,speed:10 }
};

var tree = new Tree(canvas[0],width,height,opts);
var seed = tree.seed;
var foot = tree.footer;
var hold = 1;

canvas.click(function(){
document.getElementById("myAudio").play();
hold = 0;
});

/* Seed */
var seedAnimate = eval(Jscex.compile("async",function(){
seed.draw();
while(hold){ $await(Jscex.Async.sleep(10)); }
while(seed.canScale()){
seed.scale(0.95);
$await(Jscex.Async.sleep(10));
}
while(seed.canMove()){
seed.move(0,2);
foot.draw();
$await(Jscex.Async.sleep(10));
}
}));

/* Grow */
var growAnimate = eval(Jscex.compile("async",function(){
do{ tree.grow(); $await(Jscex.Async.sleep(10)); }
while(tree.canGrow());
}));

/* Flower */
var flowAnimate = eval(Jscex.compile("async",function(){
do{ tree.flower(2); $await(Jscex.Async.sleep(10)); }
while(tree.canFlower());
}));

/* Move LEFT - SMOOTH version */
var moveAnimate = eval(Jscex.compile("async", function () {
    tree.snapshot("p1", 240, 0, 610, 680);

    // Pehle thodi der wait (flower khatam hone ke baad feel ho)
    $await(Jscex.Async.sleep(800));

    // Canvas ko smoothly left shift karo
    canvas.css("left", "-200px");   // ← yeh line tree ko left le jayegi

    // Foot bhi update karte raho thodi der
    for (var i = 0; i < 25; i++) {
        foot.draw();
        $await(Jscex.Async.sleep(80));
    }

    // Text ko ab smoothly dikhana start
    $("#text").show().addClass("visible");
}));

/* Slow typing */
function slowType(){
$("#text").show();
var lines = document.querySelectorAll("#code .say");

let delay = 0;

lines.forEach(function(line){
let txt = line.innerText;
line.innerText = "";

setTimeout(function(){
typeLine(line, txt, 70);
}, delay);

delay += (txt.length * 70) + 1000;
});
}

function typeLine(el, text, speed){
let i=0;
function t(){
if(i<text.length){
el.innerText += text.charAt(i);
i++;
setTimeout(t, speed);
}
}
t();
}

var runAsync = eval(Jscex.compile("async",function(){
$await(seedAnimate());
$await(growAnimate());
$await(flowAnimate());
$await(moveAnimate());
slowType();
}));

runAsync().start();

})();
</script>

</body>
</html>
